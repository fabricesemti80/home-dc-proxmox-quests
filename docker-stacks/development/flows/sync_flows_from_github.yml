id: sync_flows_from_github
namespace: homelab.ops
description: Import Kestra flows from the home-kestra GitHub repository.

triggers:
  - id: every_15_minutes
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/15 * * * *"

tasks:
  - id: sync_flows
    type: io.kestra.plugin.git.SyncFlows
    url: https://github.com/fabricesemti80/home-kestra.git
    branch: main
    gitDirectory: flows
    targetNamespace: homelab.ops
    includeChildNamespaces: true
    delete: false
    dryRun: false
