---
- name: Configure Debian Proxmox guests
  hosts: proxmox_debian_guests
  become: true
  roles:
    - debian_base

- name: Configure Proxmox Backup Server guests
  hosts: proxmox_backup_servers
  become: true
  roles:
    - proxmox_backup_server
    - proxmox_backup_datastore

- name: Configure Docker service guests
  hosts: docker_service_hosts
  become: true
  roles:
    - geerlingguy.docker
    - docker_service_stack
    - docker_apps_stack
