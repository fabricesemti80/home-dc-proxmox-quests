---
- name: Validate Tailscale authkey
  ansible.builtin.assert:
    that:
      - tailscale_authkey | length > 0
    fail_msg: "TAILSCALE_AUTHKEY is required for tailscale_host role."
  no_log: true

- name: Enable IP forwarding for subnet routing
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-tailscale-forwarding.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1
  notify: Reload sysctl

- name: Apply sysctl immediately
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Install Tailscale
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
    executable: /bin/bash

- name: Ensure tailscaled is enabled and running
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Build Tailscale up arguments
  ansible.builtin.set_fact:
    tailscale_up_args: >-
      --authkey={{ tailscale_authkey }}
      {{ '--ssh' if tailscale_ssh else '' }}
      {{ '--accept-dns=false' if not tailscale_accept_dns else '' }}
      {{ '--accept-routes' if tailscale_accept_routes else '' }}
      {{ '--advertise-exit-node' if tailscale_advertise_exit_node else '' }}
      {{ '--advertise-routes=' + (tailscale_advertise_routes | join(',')) if tailscale_advertise_routes | length > 0 else '' }}
      {{ '--advertise-tags=' + tailscale_advertise_tags if tailscale_advertise_tags | length > 0 else '' }}
  no_log: true

- name: Apply Tailscale settings
  ansible.builtin.command: "tailscale up {{ tailscale_up_args }}"
  no_log: true

- name: Install Tailscale services advertise script
  ansible.builtin.copy:
    dest: /usr/local/bin/advertise-tailscale-services
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      import json
      import subprocess
      import sys

      def main():
          try:
              out = subprocess.check_output(
                  ["/usr/bin/tailscale", "serve", "status", "--json"],
                  stderr=subprocess.DEVNULL,
              )
              data = json.loads(out)
          except Exception:
              sys.exit(0)

          for svc in data.get("Services", {}).keys():
              subprocess.call(
                  ["/usr/bin/tailscale", "serve", "advertise", svc],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )

      if __name__ == "__main__":
          main()

- name: Install systemd service to advertise Tailscale services
  ansible.builtin.copy:
    dest: /etc/systemd/system/advertise-tailscale-services.service
    mode: "0644"
    content: |
      [Unit]
      Description=Advertise Tailscale services
      After=tailscaled.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/advertise-tailscale-services

- name: Install systemd timer to advertise Tailscale services
  ansible.builtin.copy:
    dest: /etc/systemd/system/advertise-tailscale-services.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Advertise Tailscale services periodically

      [Timer]
      OnBootSec=60
      OnUnitActiveSec=5m
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Reload systemd daemon and enable timer
  ansible.builtin.systemd:
    daemon_reload: true
    name: advertise-tailscale-services.timer
    state: started
    enabled: true

- name: Advertise existing Tailscale services now
  ansible.builtin.command: /usr/local/bin/advertise-tailscale-services
  changed_when: true
